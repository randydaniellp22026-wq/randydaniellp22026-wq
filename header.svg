<svg viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" width="860" height="280">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Subtle noise texture via filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip path for the whole card -->
    <clipPath id="card-clip">
      <rect width="860" height="280" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background rect -->
  <rect width="860" height="280" fill="#0d1117" rx="6"/>

  <!-- Subtle top-left corner accent lines -->
  <line x1="0" y1="0" x2="0" y2="280" stroke="#21262d" stroke-width="1"/>
  <line x1="860" y1="0" x2="860" y2="280" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="0" x2="860" y2="0" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="279" x2="860" y2="279" stroke="#21262d" stroke-width="1"/>

  <!-- Top label: [ Full Stack Web Developer ] -->
  <rect x="40" y="36" width="242" height="22" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="52" y="51" font-family="'Courier New', monospace" font-size="10" fill="#6e7681" letter-spacing="2.5" text-anchor="start">[ FULL STACK WEB DEVELOPER ]</text>

  <!-- Main headline — RANDY -->
  <text x="40" y="145"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="900"
    fill="#e6edf3"
    letter-spacing="-3"
    text-anchor="start">RANDY</text>

  <!-- Main headline — LIZARME in outline/italic style -->
  <text x="40" y="218"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="900"
    font-style="italic"
    fill="none"
    stroke="#e6edf3"
    stroke-width="1.5"
    letter-spacing="-3"
    text-anchor="start">LIZARME</text>

  <!-- Horizontal divider line -->
  <line x1="40" y1="238" x2="820" y2="238" stroke="#30363d" stroke-width="1"/>

  <!-- Bottom left: tagline -->
  <text x="40" y="260"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#8b949e"
    letter-spacing="1.5"
    text-anchor="start">Turning ideas into code.</text>

  <!-- Bottom right: availability tag -->
  <rect x="690" y="248" width="130" height="20" rx="2" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="704" cy="258" r="3" fill="#3fb950"/>
  <text x="714" y="262"
    font-family="'Courier New', monospace"
    font-size="9"
    fill="#e6edf3"
    letter-spacing="1.5"
    text-anchor="start">AVAILABLE FOR WORK</text>

  <!-- Small decorative index number top right -->
  <text x="820" y="51"
    font-family="'Courier New', monospace"
    font-size="10"
    fill="#30363d"
    letter-spacing="1"
    text-anchor="end">01 / PROFILE</text>

</svg>
