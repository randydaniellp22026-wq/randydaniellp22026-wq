<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" width="860" height="540" role="img">
  <defs>
    <style>
      .bg-base { fill:#0d1117; }
      @keyframes borderFlicker {
        0%,92%,100% { stroke:#30363d; }
        93% { stroke:#ff2e63; } 94% { stroke:#30363d; }
        96% { stroke:#08d9d6; } 97% { stroke:#30363d; }
      }
      .frame { animation: borderFlicker 4s infinite; }
      @keyframes labelPulse { 0%,100%{opacity:0.55;} 50%{opacity:1;} }
      .label-text { animation: labelPulse 2.5s ease-in-out infinite; }
      @keyframes idxFlicker { 0%,100%{opacity:0.4;} 50%{opacity:0.15;} 51%{opacity:0.6;} }
      .index-text { animation: idxFlicker 3s infinite; }
      @keyframes catGlow { 0%,100%{fill:#08d9d6;} 50%{fill:#ff2e63;} }
      .cat-0 { animation: catGlow 5s ease-in-out infinite; }
      .cat-1 { animation: catGlow 5s ease-in-out infinite 1.25s; }
      .cat-2 { animation: catGlow 5s ease-in-out infinite 2.5s; }
      .cat-3 { animation: catGlow 5s ease-in-out infinite 3.75s; }
      @keyframes sweep { 0%{transform:scaleX(0);transform-origin:left;} 50%{transform:scaleX(1);} 100%{transform:scaleX(0);transform-origin:right;} }
      .acc-0 { animation: sweep 4s ease-in-out infinite; }
      .acc-1 { animation: sweep 4s ease-in-out infinite 0.5s; }
      .acc-2 { animation: sweep 4s ease-in-out infinite 1s; }
      .acc-3 { animation: sweep 4s ease-in-out infinite 1.5s; }
      @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
      .b-text { font-family:'Courier New', monospace; font-size:9.5px; fill:#e6edf3; letter-spacing:0.3px; }
      .b-cyan { fill:#161b22; stroke:#08d9d6; stroke-width:1; }
      .b-pink { fill:#161b22; stroke:#ff2e63; stroke-width:1; }
      .b-gray { fill:#161b22; stroke:#30363d; stroke-width:1; }
    </style>
  </defs>

  <rect width="860" height="540" rx="6" class="bg-base"/>
  <rect x="1" y="1" width="858" height="538" rx="6" fill="none" stroke="#30363d" stroke-width="1.5" class="frame"/>

  <rect x="40" y="22" width="120" height="20" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="36" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="2" class="label-text">[ TECH STACK ]</text>
  <text x="820" y="36" font-family="'Courier New', monospace" font-size="10" fill="#6e7681" letter-spacing="1" text-anchor="end" class="index-text">02 / STACK</text>

  <!-- ============ FRONTEND ============ -->
  <text x="40" y="72" font-family="'Courier New', monospace" font-size="13" font-weight="bold" class="cat-0">&#9658; FRONTEND &amp; CLIENT-SIDE</text>
  <rect x="40" y="78" width="250" height="1.5" fill="#08d9d6" class="acc-0"/>
  <g transform="translate(40,90)">
    <!-- Next.js -->
    <g><rect class="b-cyan" x="0" y="0" width="98" height="28" rx="3"/>
      <circle cx="16" cy="14" r="9" fill="#000" stroke="#fff" stroke-width="0.7"/>
      <path d="M12,10 l0,9 M12,10 l8,10 M20,10 l0,7" stroke="#fff" stroke-width="1.4" fill="none"/>
      <text class="b-text" x="32" y="18">NEXT.JS</text>
    </g>
    <!-- React -->
    <g transform="translate(108,0)"><rect class="b-pink" x="0" y="0" width="86" height="28" rx="3"/>
      <g transform="translate(16,14)">
        <circle r="2" fill="#61DAFB"/>
        <ellipse rx="9" ry="3.4" fill="none" stroke="#61DAFB" stroke-width="1.1"/>
        <ellipse rx="9" ry="3.4" fill="none" stroke="#61DAFB" stroke-width="1.1" transform="rotate(60)"/>
        <ellipse rx="9" ry="3.4" fill="none" stroke="#61DAFB" stroke-width="1.1" transform="rotate(120)"/>
      </g>
      <text class="b-text" x="30" y="18">REACT</text>
    </g>
    <!-- TypeScript -->
    <g transform="translate(204,0)"><rect class="b-cyan" x="0" y="0" width="112" height="28" rx="3"/>
      <rect x="6" y="6" width="16" height="16" rx="2" fill="#3178C6"/>
      <text x="14" y="18" font-family="Arial" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">TS</text>
      <text class="b-text" x="28" y="18">TYPESCRIPT</text>
    </g>
    <!-- TailwindCSS -->
    <g transform="translate(326,0)"><rect class="b-pink" x="0" y="0" width="118" height="28" rx="3"/>
      <path d="M6,16 C8,10 12,9 16,12 C18,13.5 20,15 23,14 C25,13 26,11 27,9 C25,15 21,16 17,13 C15,11.5 13,10 10,11 C8,12 7,14 6,16 z" fill="#38BDF8"/>
      <text class="b-text" x="34" y="18">TAILWINDCSS</text>
    </g>
    <!-- Framer Motion -->
    <g transform="translate(454,0)"><rect class="b-gray" x="0" y="0" width="124" height="28" rx="3"/>
      <path d="M9,5 l12,0 l0,6 l-6,0 z M9,11 l6,0 l6,6 l-12,0 z M9,17 l6,0 l0,6 z" fill="#0055FF"/>
      <text class="b-text" x="28" y="18">FRAMER MOTION</text>
    </g>
  </g>

  <!-- ============ BACKEND ============ -->
  <text x="40" y="152" font-family="'Courier New', monospace" font-size="13" font-weight="bold" class="cat-1">&#9658; BACKEND, DATABASES &amp; TESTING</text>
  <rect x="40" y="158" width="320" height="1.5" fill="#ff2e63" class="acc-1"/>
  <g transform="translate(40,170)">
    <!-- Node.js -->
    <g><rect class="b-cyan" x="0" y="0" width="92" height="28" rx="3"/>
      <path d="M14,4 l8,4.5 l0,9 l-8,4.5 l-8,-4.5 l0,-9 z" fill="#339933"/>
      <text x="14" y="17" font-family="Arial" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">JS</text>
      <text class="b-text" x="28" y="18">NODE.JS</text>
    </g>
    <!-- Express -->
    <g transform="translate(102,0)"><rect class="b-pink" x="0" y="0" width="104" height="28" rx="3"/>
      <text x="14" y="19" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">e</text>
      <text class="b-text" x="28" y="18">EXPRESS.JS</text>
    </g>
    <!-- Supabase -->
    <g transform="translate(216,0)"><rect class="b-cyan" x="0" y="0" width="100" height="28" rx="3"/>
      <path d="M14,4 l0,9 l7,0 z M14,24 l0,-9 l-7,0 z" fill="#3ECF8E"/>
      <text class="b-text" x="28" y="18">SUPABASE</text>
    </g>

    <!-- Postgres -->
    <g transform="translate(520,0)"><rect class="b-cyan" x="0" y="0" width="100" height="28" rx="3"/>
      <ellipse cx="14" cy="14" rx="9" ry="9" fill="#336791"/>
      <path d="M9,11 C9,8 19,8 19,11 M11,11 l0,6 M14,11 l0,7 M17,11 l0,6" stroke="#fff" stroke-width="1" fill="none"/>
      <text class="b-text" x="28" y="18">POSTGRES</text>
    </g>
    <!-- MySQL -->
    <g transform="translate(630,0)"><rect class="b-pink" x="0" y="0" width="78" height="28" rx="3"/>
      <path d="M6,18 C8,10 14,9 20,14 C18,13 16,15 18,17 C15,16 13,12 10,15 C8,16 7,17 6,18 z" fill="#00758F"/>
      <circle cx="19" cy="16" r="1.5" fill="#F29111"/>
      <text class="b-text" x="28" y="18">MYSQL</text>
    </g>
  </g>
  <g transform="translate(40,204)">
    <!-- Sequelize -->
    <g><rect class="b-gray" x="0" y="0" width="100" height="28" rx="3"/>
      <path d="M14,5 a9,9 0 1,0 0.1,0 z M14,9 a5,5 0 1,1 -0.1,0 z" fill="#52B0E7"/>
      <text class="b-text" x="28" y="18">SEQUELIZE</text>
    </g>
    <!-- Jest -->
    <g transform="translate(110,0)"><rect class="b-cyan" x="0" y="0" width="68" height="28" rx="3"/>
      <circle cx="14" cy="14" r="9" fill="#C21325"/>
      <circle cx="11" cy="12" r="1.5" fill="#fff"/>
      <circle cx="17" cy="12" r="1.5" fill="#fff"/>
      <path d="M10,17 C12,19 16,19 18,17" stroke="#fff" stroke-width="1.2" fill="none"/>
      <text class="b-text" x="28" y="18">JEST</text>
    </g>
  </g>

  <!-- ============ AI ============ -->
  <text x="40" y="276" font-family="'Courier New', monospace" font-size="13" font-weight="bold" class="cat-2">&#9658; AI AUTOMATION</text>
  <rect x="40" y="282" width="200" height="1.5" fill="#08d9d6" class="acc-2"/>
  <g transform="translate(40,294)">

    <!-- OpenAI -->
    <g transform="translate(352,0)"><rect class="b-gray" x="0" y="0" width="84" height="28" rx="3"/>
      <path d="M14,5 a9,9 0 1,0 0.1,0 z" fill="none" stroke="#10A37F" stroke-width="2"/>
      <path d="M14,9 l5,3 l0,4 l-5,3 l-5,-3 l0,-4 z" fill="none" stroke="#10A37F" stroke-width="1.2"/>
      <text class="b-text" x="28" y="18">OPENAI</text>
    </g>
    <!-- Claude Code -->
    <g transform="translate(446,0)"><rect class="b-cyan" x="0" y="0" width="120" height="28" rx="3"/>
      <path d="M14,5 a9,9 0 1,0 0.1,0 z" fill="#D97757"/>
      <path d="M9,17 l3,-8 l1,0 l3,8 M10,14 l4,0" stroke="#fff" stroke-width="1" fill="none"/>
      <text class="b-text" x="28" y="18">CLAUDE CODE</text>
    </g>
  </g>
  <g transform="translate(40,328)">
    <!-- Google Antigravity -->
    <g><rect class="b-pink" x="0" y="0" width="178" height="28" rx="3"/>
      <circle cx="14" cy="14" r="8" fill="none" stroke="#4285F4" stroke-width="2"/>
      <path d="M14,14 l6,-3 M14,14 l-2,6" stroke="#EA4335" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="2" fill="#FBBC05"/>
      <text class="b-text" x="28" y="18">GOOGLE ANTIGRAVITY</text>
    </g>
  </g>

  <!-- ============ DEVOPS ============ -->
  <text x="40" y="400" font-family="'Courier New', monospace" font-size="13" font-weight="bold" class="cat-3">&#9658; DEVOPS &amp; TOOLING</text>
  <rect x="40" y="406" width="220" height="1.5" fill="#ff2e63" class="acc-3"/>
  <g transform="translate(40,418)">
    <!-- Docker -->
    <g><rect class="b-cyan" x="0" y="0" width="88" height="28" rx="3"/>
      <g transform="translate(5,8)">
        <rect x="2" y="5" width="3.5" height="3.5" fill="#2496ED"/>
        <rect x="6" y="5" width="3.5" height="3.5" fill="#2496ED"/>
        <rect x="10" y="5" width="3.5" height="3.5" fill="#2496ED"/>
        <rect x="6" y="1" width="3.5" height="3.5" fill="#2496ED"/>
        <path d="M0,8.5 l17,0 C17,12 14,13 11,13 l-9,0 C1,13 0,11 0,8.5 z" fill="#2496ED"/>
        <path d="M17,7 C19,5.5 21,7 20,8.5 C22,8 22,10 20,10.5 C19,9.5 18,8 17,8 z" fill="#2496ED"/>
      </g>
      <text class="b-text" x="28" y="18">DOCKER</text>
    </g>
    <!-- Linux (Tux) -->
    <g transform="translate(98,0)"><rect class="b-pink" x="0" y="0" width="76" height="28" rx="3"/>
      <ellipse cx="14" cy="15" rx="6" ry="8" fill="#000"/>
      <ellipse cx="14" cy="10" rx="4.5" ry="5" fill="#000"/>
      <circle cx="12" cy="9" r="1.3" fill="#fff"/>
      <circle cx="16" cy="9" r="1.3" fill="#fff"/>
      <path d="M12.5,11 l1.5,2 l1.5,-2 z" fill="#F8C300"/>
      <path d="M9,20 l3,2 M19,20 l-3,2" stroke="#F8C300" stroke-width="1.5"/>
      <text class="b-text" x="28" y="18">LINUX</text>
    </g>
    <!-- AWS S3 -->
    <g transform="translate(318,0)"><rect class="b-gray" x="0" y="0" width="84" height="28" rx="3"/>
      <path d="M8,8 l12,0 l-1.5,12 l-9,0 z" fill="#569A31"/>
      <path d="M8,8 l12,0 l-0.5,4 l-11,0 z" fill="#3F6F21"/>
      <text class="b-text" x="28" y="18">AWS S3</text>
    </g>
    <!-- Git -->
    <g transform="translate(410,0)"><rect class="b-pink" x="0" y="0" width="64" height="28" rx="3"/>
      <g transform="translate(5,5)">
        <rect x="0" y="0" width="18" height="18" rx="2.5" fill="#F05032" transform="rotate(45 9 9)"/>
        <circle cx="5" cy="9" r="1.8" fill="#fff"/>
        <circle cx="12" cy="6" r="1.8" fill="#fff"/>
        <circle cx="12" cy="12" r="1.8" fill="#fff"/>
        <line x1="5" y1="9" x2="12" y2="6" stroke="#fff" stroke-width="1"/>
        <line x1="5" y1="9" x2="12" y2="12" stroke="#fff" stroke-width="1"/>
      </g>
      <text class="b-text" x="28" y="18">GIT</text>
    </g>
    <!-- Postman -->
    <g transform="translate(484,0)"><rect class="b-cyan" x="0" y="0" width="96" height="28" rx="3"/>
      <circle cx="14" cy="14" r="9" fill="#FF6C37"/>
      <path d="M11,17 l5,-5 a2,2 0 0,0 -3,-3 l-5,5 z" fill="#fff"/>
      <circle cx="14.5" cy="11.5" r="1" fill="#FF6C37"/>
      <text class="b-text" x="28" y="18">POSTMAN</text>
    </g>
  </g>

  <!-- bottom decorative line -->
  <rect x="40" y="476" width="780" height="1" fill="#21262d"/>
  <text x="820" y="496" font-family="'Courier New', monospace" font-size="9" fill="#6e7681" text-anchor="end" class="index-text">26 TECHNOLOGIES // STACK_LOADED</text>
  <text x="40" y="496" font-family="'Courier New', monospace" font-size="9" fill="#3fb950">&#9608; SYSTEM ONLINE</text>
</svg>
